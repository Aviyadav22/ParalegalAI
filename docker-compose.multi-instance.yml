# Multi-node ChromaDB setup for ParalegalAI
# docker-compose.multi-instance.yml
version: '3.8'

services:
  # ChromaDB Node 1 - Legal Cases
  chromadb-1:
    image: chromadb/chroma:latest
    container_name: chromadb-1
    ports:
      - "8001:8000"
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - IS_PERSISTENT=TRUE
      - CHROMA_NODE_ID=node-1
    volumes:
      - ./chromadb-data-1:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ChromaDB Node 2 - Contracts
  chromadb-2:
    image: chromadb/chroma:latest
    container_name: chromadb-2
    ports:
      - "8002:8000"
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - IS_PERSISTENT=TRUE
      - CHROMA_NODE_ID=node-2
    volumes:
      - ./chromadb-data-2:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ChromaDB Node 3 - Statutes & Regulations
  chromadb-3:
    image: chromadb/chroma:latest
    container_name: chromadb-3
    ports:
      - "8003:8000"
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - IS_PERSISTENT=TRUE
      - CHROMA_NODE_ID=node-3
    volumes:
      - ./chromadb-data-3:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Load Balancer (Nginx)
  chromadb-lb:
    image: nginx:alpine
    container_name: chromadb-lb
    ports:
      - "8000:80"
    volumes:
      - ./nginx-chromadb.conf:/etc/nginx/nginx.conf
    depends_on:
      - chromadb-1
      - chromadb-2
      - chromadb-3
    restart: unless-stopped

  # ParalegalAI with Multi-Instance Support
  paralegal-ai:
    build: .
    container_name: paralegal-ai
    ports:
      - "80:3001"
      - "443:8888"
    environment:
      - NODE_ENV=production
      - STORAGE_DIR=/app/server/storage
      - ANYTHING_LLM_RUNTIME=docker
      # Multi-Instance ChromaDB Configuration
      - VECTOR_DB=chroma-multi
      - CHROMA_ENDPOINTS=http://chromadb-1:8000,http://chromadb-2:8000,http://chromadb-3:8000
      - CHROMA_LOAD_BALANCER=http://chromadb-lb:80
      - CHROMA_STRATEGY=round-robin
      # LLM Configuration
      - LLM_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_PREF=gemini-1.5-pro
      - EMBEDDING_MODEL_PREF=embedding-001
      - DISABLE_NATIVE_EMBEDDINGS=true
      - FORCE_EMBEDDING_PROVIDER=gemini
      - EMBEDDING_ENGINE=gemini
      # Other settings
      - MULTI_USER_MODE=${MULTI_USER_MODE:-false}
      - DISABLE_TELEMETRY=${DISABLE_TELEMETRY:-false}
      - JWT_SECRET=${JWT_SECRET:-mu8aL6T9Lqz1XWeQrnplGcY/CEpS207NBJtTJXqeX4s=}
      - JWT_EXPIRY=${JWT_EXPIRY:-24h}
      - SIG_KEY=${SIG_KEY:-1Y2ua8QGdUTDdoy4OCpIew==}
      - SIG_SALT=${SIG_SALT:-1Y2ua8QGdUTDdoy4OCpIew==}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://yourdomain.com}
      - CORS_CREDENTIALS=${CORS_CREDENTIALS:-true}
    volumes:
      - paralegal_data:/app/server/storage
    depends_on:
      - chromadb-1
      - chromadb-2
      - chromadb-3
      - chromadb-lb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  paralegal_data:
    driver: local

